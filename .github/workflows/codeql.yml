name: CodeQL (reusable)

# Deterministic SAST via GitHub CodeQL. Free on public repos; private repos need
# GitHub Advanced Security. No API key. Results land in the repo's Security tab
# (code scanning alerts), not in public output.
#
# Consumers call it:
#   jobs:
#     codeql:
#       uses: PRavaga/ci-security/.github/workflows/codeql.yml@v1.3.0

on:
  workflow_call:
    inputs:
      languages:
        type: string
        default: javascript-typescript

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ inputs.languages }}
      # JS/TS is interpreted — no autobuild step needed.
      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
