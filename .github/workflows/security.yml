name: Security (reusable)

# Reusable security workflow. Consumers pin an IMMUTABLE ref and pass only the
# one secret they want shared:
#
#   jobs:
#     security:
#       uses: PRavaga/ci-security/.github/workflows/security.yml@<full-sha-or-vX.Y.Z>
#       secrets:
#         CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
#
# Layer 1 (guard) runs the consumer's VENDORED scripts/security-guard.mjs (copied
# from this repo) — no code is fetched from the network at run time. Layer 2
# (ai-review) runs Claude over the PR diff, self-skipping without a key, on forks,
# or on oversized PRs.
#
# Do NOT use `secrets: inherit` (over-shares every secret; doesn't pass
# cross-owner) and do NOT pin a moving tag.

on:
  workflow_call:
    inputs:
      claude-model:
        type: string
        default: claude-sonnet-4-6
      exclude-directories:
        type: string
        default: build,node_modules,.context,dist
      max-changed-lines:
        type: number
        default: 5000
    secrets:
      CLAUDE_API_KEY:
        required: false

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: Pattern guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - name: Run vendored guard
        run: |
          if [ -f scripts/security-guard.mjs ]; then
            node scripts/security-guard.mjs
          elif [ -f security-guard.config.json ]; then
            echo "::error::security-guard.config.json present but scripts/security-guard.mjs is not vendored. Copy it from PRavaga/ci-security."
            exit 1
          else
            echo "No vendored guard in this repo — skipping Layer 1."
          fi

  ai-key-present:
    name: Check AI key
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -n "$CLAUDE_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_API_KEY not set — AI review skipped."
          fi

  ai-review:
    name: AI security review
    needs: ai-key-present
    if: github.event_name == 'pull_request' && needs.ai-key-present.outputs.present == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Cost guard (skip oversized PRs)
        id: size
        env:
          ADD: ${{ github.event.pull_request.additions }}
          DEL: ${{ github.event.pull_request.deletions }}
          CAP: ${{ inputs.max-changed-lines }}
        run: |
          CHANGED=$(( ${ADD:-0} + ${DEL:-0} ))
          if [ "$CHANGED" -le "${CAP:-5000}" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR changes $CHANGED lines (> $CAP) — AI review skipped to bound cost."
          fi
      - if: steps.size.outputs.proceed == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      # Third-party action, SHA-pinned. Runs Claude Code with shell on PR content
      # and is not prompt-injection hardened — only reached on non-fork PRs (gated
      # by the secret). Bump the SHA deliberately via Dependabot.
      - if: steps.size.outputs.proceed == 'true'
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main @ 2026-06-22
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: ${{ inputs.claude-model }}
          comment-pr: true
          run-every-commit: true
          exclude-directories: ${{ inputs.exclude-directories }}
