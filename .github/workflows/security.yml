name: Security (reusable)

# Reusable security workflow. Consumers call it from their own workflow:
#
#   jobs:
#     security:
#       uses: PRavaga/ci-security/.github/workflows/security.yml@v1
#       secrets: inherit
#
# Layer 1 (guard): runs this repo's canonical runner against the caller's code,
#   reading the caller's security-guard.config.json (skips if absent). No secret.
# Layer 2 (ai-review): Claude reviews the PR diff. Self-skips unless a
#   CLAUDE_API_KEY secret is present, and only on pull_request events.

on:
  workflow_call:
    inputs:
      claude-model:
        type: string
        default: claude-opus-4-8
      exclude-directories:
        type: string
        default: build,node_modules,.context
      runner-ref:
        description: Git ref of PRavaga/ci-security to pull the guard runner from.
        type: string
        default: v1
    secrets:
      CLAUDE_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  guard:
    name: Pattern guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo under review
        uses: actions/checkout@v4
      - name: Checkout guard runner
        uses: actions/checkout@v4
        with:
          repository: PRavaga/ci-security
          ref: ${{ inputs.runner-ref }}
          path: .ci-security
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run guard (skips if repo has no security-guard.config.json)
        run: node .ci-security/scripts/security-guard.mjs

  ai-key-present:
    name: Check AI key
    runs-on: ubuntu-latest
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - id: check
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          if [ -n "$CLAUDE_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLAUDE_API_KEY not set — AI security review skipped."
          fi

  ai-review:
    name: AI security review
    needs: ai-key-present
    if: ${{ github.event_name == 'pull_request' && needs.ai-key-present.outputs.present == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: ${{ inputs.claude-model }}
          comment-pr: true
          exclude-directories: ${{ inputs.exclude-directories }}
